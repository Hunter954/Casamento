{% extends 'base.html' %}
{% block title %}Confirmar presença{% endblock %}
{% block content %}
<div class="page-shell container narrow">
  <a href="{{ url_for('public.home') }}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
  <div class="section-card">
    <div class="section-title"><span>RSVP</span><h1>Confirmar presença</h1></div>
    <form class="stack-form" method="post">
      <input name="guest_name" placeholder="Seu nome" required>
      <input name="phone" placeholder="Telefone / WhatsApp" required>
      <input name="email" type="email" placeholder="E-mail">
      <select name="attendance">
        <option value="yes">Confirmo presença</option>
        <option value="no">Não poderei comparecer</option>
      </select>
      <input name="guests_count" type="number" min="1" max="10" value="1" placeholder="Quantidade de pessoas">
      <textarea name="message" placeholder="Quer deixar um recado?"></textarea>
      <button class="btn btn-primary btn-full">Enviar confirmação</button>
    </form>
  </div>
</div>
{% endblock %}
