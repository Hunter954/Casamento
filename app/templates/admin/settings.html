{% extends 'admin/base.html' %}
{% block admin_content %}
<div class="admin-header"><h1>Configurações do site</h1><p>Controle visual, textos e informações do casamento.</p></div>
<form class="section-card stack-form" method="post" enctype="multipart/form-data">
  <label>Nomes do casal<input name="couple_names" value="{{ settings.couple_names }}"></label>
  <label>Frase principal<input name="hero_phrase" value="{{ settings.hero_phrase }}"></label>
  <label>Data e hora do casamento<input type="datetime-local" name="wedding_date" value="{{ settings.wedding_date.strftime('%Y-%m-%dT%H:%M') if settings.wedding_date else '' }}"></label>
  <label>Nome do local<input name="wedding_location_name" value="{{ settings.wedding_location_name }}"></label>
  <label>Endereço<input name="wedding_address" value="{{ settings.wedding_address }}"></label>
  <label>Cidade<input name="wedding_city" value="{{ settings.wedding_city }}"></label>
  <label>Horário<input name="wedding_time" value="{{ settings.wedding_time }}"></label>
  <label>URL do mapa embed<textarea name="map_embed_url">{{ settings.map_embed_url }}</textarea></label>
  <label>URL de rota<textarea name="route_url">{{ settings.route_url }}</textarea></label>
  <label>Título do banner de presentes<input name="gift_banner_title" value="{{ settings.gift_banner_title }}"></label>
  <label>Texto do botão de presentes<input name="gift_button_label" value="{{ settings.gift_button_label }}"></label>
  <label>Mensagem final<textarea name="final_message">{{ settings.final_message }}</textarea></label>
  <div class="color-row">
    <label>Cor principal<input type="color" name="theme_primary" value="{{ settings.theme_primary }}"></label>
    <label>Cor secundária<input type="color" name="theme_secondary" value="{{ settings.theme_secondary }}"></label>
    <label>Cor destaque<input type="color" name="theme_accent" value="{{ settings.theme_accent }}"></label>
  </div>
  <label>Imagem do topo<input type="file" name="hero_image"></label>
  <label>Imagem do banner de presentes<input type="file" name="gift_banner_image"></label>
  <label>Template do WhatsApp<textarea name="whatsapp_message_template">{{ settings.whatsapp_message_template }}</textarea></label>
  <label class="checkline"><input type="checkbox" name="allow_guestbook" {% if settings.allow_guestbook %}checked{% endif %}> Permitir mural de recados</label>
  <label class="checkline"><input type="checkbox" name="require_guestbook_approval" {% if settings.require_guestbook_approval %}checked{% endif %}> Exigir aprovação dos recados</label>
  <button class="btn btn-primary">Salvar alterações</button>
</form>
{% endblock %}
